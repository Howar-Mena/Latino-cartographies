<!doctype html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover'>
    <meta charset='utf-8'>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <title>Art As Activism</title>
</head>
<body>
    <canvas id="application-canvas"></canvas>

    <script type="module">
        // Points to your modern engine folder
        import { createApplication } from './js/index.mjs';

        async function launch() {
            // 1. Fetch the scene config
            const configResponse = await fetch('./config.json');
            const config = await configResponse.json();

            // 2. Start the App
            const app = await createApplication(config);
            app.start();

            // 3. ONLY NOW load the game scripts so 'pc' is defined
            const script = document.createElement('script');
            script.src = 'game-scripts.js'; 
            document.body.appendChild(script);
        }

        launch().catch(console.error);
    </script>
</body>
</html>
