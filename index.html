<<!doctype html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover'>
    <meta charset='utf-8'>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <title>Art As Activism</title>
</head>
<body>
    <canvas id="application-canvas"></canvas>

    <script type="module">
        // Import the engine from your js folder
        import { createApplication } from './js/index.mjs';

        async function startApp() {
            try {
                // 1. Load the config
                const response = await fetch('./config.json');
                if (!response.ok) throw new Error('Config not found');
                const config = await response.json();

                // 2. Create and Start the App
                const app = await createApplication(config);
                app.start();

                // 3. Load your interactivity scripts ONLY after app starts
                const script = document.createElement('script');
                script.src = './game-scripts.js'; // Make sure the file in your folder is named exactly this
                document.body.appendChild(script);

                console.log("App initialized successfully");
            } catch (err) {
                console.error("Critical Start Error:", err);
            }
        }

        startApp();
    </script>
</body>
</html>
